services:
  # ── MF Stock Matcher ──────────────────────────────────────
  - type: web
    name: mf-stock-matcher
    runtime: python
    rootDir: mf stock matcher
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: MF_SHARED_DATA_DIR
        value: /opt/render/project/src/shared-data
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /health
    plan: free
